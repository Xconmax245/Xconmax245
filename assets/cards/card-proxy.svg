<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 260 200" width="260" height="200" role="img" aria-label="Proxy Protocol — Project Card">
  <defs>
    <linearGradient id="cbg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#050d1a"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="ctop1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00F0FF" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#00F0FF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4F9DFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="cg1" x="-20%" y="-100%" width="140%" height="300%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style><![CDATA[
      @keyframes borderGlow1 {
        0%,100% { stroke-opacity:.25; }
        50%     { stroke-opacity:.55; }
      }
      .cb1 { animation: borderGlow1 3s ease-in-out infinite; }
    ]]></style>
  </defs>

  <!-- Card body -->
  <rect width="260" height="200" rx="14" fill="url(#cbg1)"/>
  <rect class="cb1" width="260" height="200" rx="14" fill="none" stroke="#00F0FF" stroke-width="1"/>
  <!-- Top accent line -->
  <rect x="0" y="0" width="260" height="1.5" rx="1" fill="url(#ctop1)" filter="url(#cg1)"/>

  <!-- Icon placeholder (Proxy/shield shape) -->
  <polygon points="130,22 148,32 148,50 130,60 112,50 112,32"
           fill="none" stroke="#00F0FF" stroke-width="1.2" stroke-opacity="0.7"/>
  <polygon points="130,28 143,35 143,49 130,56 117,49 117,35"
           fill="#00F0FF" opacity="0.06"/>
  <circle cx="130" cy="42" r="5" fill="#00F0FF" opacity="0.8" filter="url(#cg1)"/>

  <!-- Tag: FLAGSHIP -->
  <rect x="8" y="8" width="56" height="16" rx="4" fill="#00F0FF" opacity="0.1"/>
  <text x="36" y="20" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="8" fill="#00F0FF" letter-spacing="1">FLAGSHIP</text>

  <!-- Project name -->
  <text x="130" y="84" text-anchor="middle"
        font-family="'Inter', system-ui, sans-serif" font-size="15" font-weight="700"
        fill="#FFFFFF">Proxy Protocol</text>

  <!-- Divider -->
  <rect x="80" y="92" width="100" height="0.5" fill="#4F9DFF" opacity="0.4"/>

  <!-- Description -->
  <text x="130" y="112" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#666666">Decentralized wallet</text>
  <text x="130" y="126" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#666666">infrastructure</text>

  <!-- Tags row -->
  <rect x="22"  y="146" width="62" height="18" rx="5" fill="#111111"/>
  <text x="53"  y="159" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#3178C6">TypeScript</text>

  <rect x="90"  y="146" width="48" height="18" rx="5" fill="#111111"/>
  <text x="114" y="159" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#888888">Solidity</text>

  <rect x="144" y="146" width="36" height="18" rx="5" fill="#111111"/>
  <text x="162" y="159" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#DC382D">Redis</text>

  <!-- CTA link -->
  <text x="130" y="184" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#4F9DFF" letter-spacing="0.5">View Project →</text>

  <!-- Corner bracket decorations -->
  <polyline points="245,186 258,186 258,198" fill="none" stroke="#4F9DFF" stroke-width="1" stroke-opacity="0.3"/>
  <polyline points="2,186 2,198 14,198" fill="none" stroke="#4F9DFF" stroke-width="1" stroke-opacity="0.3"/>
</svg>
