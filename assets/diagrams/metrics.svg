<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 800 130" width="800" height="130" role="img" aria-label="Engineering Metrics">
  <title>Engineering Metrics — Xconmax245</title>
  <defs>
    <linearGradient id="mbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#000000"/>
      <stop offset="100%" stop-color="#020a14"/>
    </linearGradient>
    <linearGradient id="mcard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#4F9DFF" stop-opacity="0.01"/>
    </linearGradient>
    <filter id="mglow" x="-20%" y="-100%" width="140%" height="300%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style><![CDATA[
      @keyframes valFade {
        0%,100% { opacity:.8; }
        50%     { opacity:1; }
      }
      .mv { animation: valFade 4s ease-in-out infinite; }
    ]]></style>
  </defs>

  <rect width="800" height="130" fill="url(#mbg)"/>

  <!-- Header -->
  <text x="400" y="20" text-anchor="middle"
        font-family="'Inter', system-ui, sans-serif" font-size="10" font-weight="500"
        fill="#333333" letter-spacing="3">ENGINEERING METRICS</text>

  <!-- ═══ 6 METRIC CARDS ═══ -->
  <!-- Metrics are placeholders — updated by release.yml GitHub Action -->
  <!-- Card spacing: width=112, gap=10, start=12 -->

  <!-- Card 1: Repositories -->
  <rect x="12" y="30" width="112" height="82" rx="10" fill="url(#mcard)" stroke="#4F9DFF" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="68" y="62" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="24" font-weight="700" fill="#FFFFFF" class="mv" filter="url(#mglow)"><!--REPOS-->28</text>
  <text x="68" y="82" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#4F9DFF" letter-spacing="1">REPOS</text>
  <text x="68" y="100" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="8" fill="#333333">Repositories</text>

  <!-- Card 2: Stars -->
  <rect x="134" y="30" width="112" height="82" rx="10" fill="url(#mcard)" stroke="#4F9DFF" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="190" y="62" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="24" font-weight="700" fill="#FFFFFF" class="mv" filter="url(#mglow)"><!--STARS-->0</text>
  <text x="190" y="82" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#4F9DFF" letter-spacing="1">STARS</text>
  <text x="190" y="100" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="8" fill="#333333">Total Stars</text>

  <!-- Card 3: Commits -->
  <rect x="256" y="30" width="112" height="82" rx="10" fill="url(#mcard)" stroke="#4F9DFF" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="312" y="62" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="24" font-weight="700" fill="#FFFFFF" class="mv" filter="url(#mglow)"><!--COMMITS-->58</text>
  <text x="312" y="82" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#4F9DFF" letter-spacing="1">COMMITS</text>
  <text x="312" y="100" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="8" fill="#333333">This Year</text>

  <!-- Card 4: Followers -->
  <rect x="378" y="30" width="112" height="82" rx="10" fill="url(#mcard)" stroke="#4F9DFF" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="434" y="62" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="24" font-weight="700" fill="#FFFFFF" class="mv" filter="url(#mglow)"><!--FOLLOWERS-->1</text>
  <text x="434" y="82" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#4F9DFF" letter-spacing="1">FOLLOWERS</text>
  <text x="434" y="100" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="8" fill="#333333">GitHub</text>

  <!-- Card 5: PRs -->
  <rect x="500" y="30" width="112" height="82" rx="10" fill="url(#mcard)" stroke="#4F9DFF" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="556" y="62" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="24" font-weight="700" fill="#FFFFFF" class="mv" filter="url(#mglow)"><!--PRS-->0</text>
  <text x="556" y="82" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#4F9DFF" letter-spacing="1">PULL REQS</text>
  <text x="556" y="100" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="8" fill="#333333">Merged</text>

  <!-- Card 6: Issues -->
  <rect x="622" y="30" width="112" height="82" rx="10" fill="url(#mcard)" stroke="#00F0FF" stroke-width="0.5" stroke-opacity="0.35"/>
  <text x="678" y="62" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="24" font-weight="700" fill="#00F0FF" class="mv" filter="url(#mglow)"><!--ISSUES-->0</text>
  <text x="678" y="82" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="9" fill="#00F0FF" letter-spacing="1">ISSUES</text>
  <text x="678" y="100" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="8" fill="#333333">Closed</text>

  <!-- Auto-update label -->
  <text x="400" y="122" text-anchor="middle"
        font-family="'JetBrains Mono', monospace" font-size="8" letter-spacing="1.5"
        fill="#222222">AUTO-UPDATED · GITHUB API</text>
</svg>
