<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 800 80" width="800" height="80" role="img" aria-label="Footer">
  <defs>
    <linearGradient id="fg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#4F9DFF" stop-opacity="0.8"/>
      <stop offset="50%"  stop-color="#00F0FF" stop-opacity="1"/>
      <stop offset="80%"  stop-color="#4F9DFF" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fbg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="1"/>
    </linearGradient>
    <filter id="glow-line" x="-5%" y="-300%" width="110%" height="700%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style><![CDATA[
      @keyframes laserPulse {
        0%,100% { opacity:.5; }
        50%     { opacity:1;  }
      }
      @keyframes dotMove {
        0%   { transform:translateX(-800px); opacity:0; }
        5%   { opacity:1; }
        95%  { opacity:1; }
        100% { transform:translateX(800px); opacity:0; }
      }
      .laser  { animation: laserPulse 3s ease-in-out infinite; }
      .dot1   { animation: dotMove 6s linear infinite 0s; }
      .dot2   { animation: dotMove 6s linear infinite 3s; }
    ]]></style>
  </defs>

  <!-- Background fade -->
  <rect width="800" height="80" fill="#000000"/>
  <rect width="800" height="80" fill="url(#fbg)"/>

  <!-- Laser line -->
  <line class="laser" x1="0" y1="32" x2="800" y2="32"
        stroke="url(#fg)" stroke-width="1" filter="url(#glow-line)"/>

  <!-- Moving dot on line -->
  <circle class="dot1" cx="400" cy="32" r="3" fill="#00F0FF" filter="url(#glow-line)"/>
  <circle class="dot2" cx="400" cy="32" r="2" fill="#4F9DFF" filter="url(#glow-line)"/>

  <!-- Signature -->
  <text x="400" y="60"
        text-anchor="middle"
        font-family="'JetBrains Mono', monospace"
        font-size="10" font-weight="400" letter-spacing="2"
        fill="#333333">Ademola Badru · 2026 · Built with precision.</text>
</svg>
