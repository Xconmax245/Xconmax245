<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 800 280" width="800" height="280" role="img"
     aria-label="Ademola Badru — Full-Stack Developer">
  <title>Ademola Badru — Building infrastructure. Building AI. Building Web3.</title>
  <defs>

    <!-- ═══ GRADIENTS ═══ -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#000000"/>
      <stop offset="55%"  stop-color="#020a14"/>
      <stop offset="100%" stop-color="#000c1a"/>
    </linearGradient>

    <linearGradient id="accent-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00F0FF" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#4F9DFF" stop-opacity="1"/>
      <stop offset="70%"  stop-color="#00F0FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4F9DFF" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="glass" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.055"/>
      <stop offset="100%" stop-color="#4F9DFF" stop-opacity="0.015"/>
    </linearGradient>

    <linearGradient id="beam-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#4F9DFF" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#4F9DFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#4F9DFF" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="vignette" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#000000" stop-opacity="0.7"/>
      <stop offset="20%"  stop-color="#000000" stop-opacity="0"/>
      <stop offset="80%"  stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.7"/>
    </linearGradient>

    <!-- ═══ FILTERS ═══ -->
    <filter id="f-node" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="f-node-sm" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="f-text" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="f-line" x="-10%" y="-200%" width="120%" height="500%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- ═══ ANIMATION PATHS ═══ -->
    <path id="pA" d="M60,68 L152,46"/>
    <path id="pB" d="M152,46 L110,208"/>
    <path id="pC" d="M110,208 L58,238"/>
    <path id="pD" d="M696,58 L748,188"/>
    <path id="pE" d="M748,188 L644,238"/>
    <path id="pF" d="M644,238 L728,256"/>

    <!-- ═══ STYLES ═══ -->
    <style><![CDATA[
      @keyframes nPulse {
        0%,100% { opacity:.45; }
        50%      { opacity:1; }
      }
      @keyframes beamMove {
        0%         { transform:translateX(-220px); opacity:0; }
        8%         { opacity:1; }
        92%        { opacity:1; }
        100%       { transform:translateX(1020px); opacity:0; }
      }
      @keyframes cursorBlink {
        0%,49%  { opacity:1; }
        50%,100%{ opacity:0; }
      }
      @keyframes gridFade {
        0%,100% { opacity:.042; }
        50%     { opacity:.072; }
      }
      @keyframes ringExpand {
        0%   { r:6; opacity:.5; }
        100% { r:18; opacity:0; }
      }

      .n1  { animation: nPulse 3.1s ease-in-out infinite 0.0s; }
      .n2  { animation: nPulse 3.4s ease-in-out infinite 0.6s; }
      .n3  { animation: nPulse 2.9s ease-in-out infinite 1.2s; }
      .n4  { animation: nPulse 3.6s ease-in-out infinite 0.3s; }
      .n5  { animation: nPulse 3.0s ease-in-out infinite 1.8s; }
      .n6  { animation: nPulse 4.0s ease-in-out infinite 0.9s; }
      .n7  { animation: nPulse 3.3s ease-in-out infinite 2.2s; }
      .n8  { animation: nPulse 3.7s ease-in-out infinite 0.5s; }

      .beam1 { animation: beamMove 11s ease-in-out infinite 0s;  }
      .beam2 { animation: beamMove 11s ease-in-out infinite 5.5s; }

      .cursor { animation: cursorBlink 1.1s step-end infinite; }
      .grid   { animation: gridFade   7s  ease-in-out infinite; }

      .ring1 { animation: ringExpand 3s ease-out infinite 0s; }
      .ring2 { animation: ringExpand 3s ease-out infinite 1.5s; }
    ]]></style>
  </defs>

  <!-- ═══ BACKGROUND ═══ -->
  <rect width="800" height="280" fill="url(#bg)"/>

  <!-- ═══ GRID ═══ -->
  <g class="grid" stroke="#4F9DFF" stroke-width="0.5" fill="none">
    <line x1="40"  y1="0" x2="40"  y2="280"/>
    <line x1="80"  y1="0" x2="80"  y2="280"/>
    <line x1="120" y1="0" x2="120" y2="280"/>
    <line x1="160" y1="0" x2="160" y2="280"/>
    <line x1="200" y1="0" x2="200" y2="280"/>
    <line x1="240" y1="0" x2="240" y2="280"/>
    <line x1="280" y1="0" x2="280" y2="280"/>
    <line x1="320" y1="0" x2="320" y2="280"/>
    <line x1="360" y1="0" x2="360" y2="280"/>
    <line x1="400" y1="0" x2="400" y2="280"/>
    <line x1="440" y1="0" x2="440" y2="280"/>
    <line x1="480" y1="0" x2="480" y2="280"/>
    <line x1="520" y1="0" x2="520" y2="280"/>
    <line x1="560" y1="0" x2="560" y2="280"/>
    <line x1="600" y1="0" x2="600" y2="280"/>
    <line x1="640" y1="0" x2="640" y2="280"/>
    <line x1="680" y1="0" x2="680" y2="280"/>
    <line x1="720" y1="0" x2="720" y2="280"/>
    <line x1="760" y1="0" x2="760" y2="280"/>
    <line x1="0" y1="40"  x2="800" y2="40"/>
    <line x1="0" y1="80"  x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
  </g>

  <!-- ═══ LIGHT BEAMS ═══ -->
  <rect class="beam1" x="-220" y="0" width="160" height="280" fill="url(#beam-grad)"/>
  <rect class="beam2" x="-220" y="0" width="90"  height="280" fill="url(#beam-grad)" opacity="0.5"/>

  <!-- ═══ LEFT NODE CLUSTER ═══ -->
  <g stroke="#4F9DFF" stroke-width="0.7" opacity="0.28" fill="none">
    <line x1="60"  y1="68"  x2="152" y2="46"/>
    <line x1="152" y1="46"  x2="110" y2="208"/>
    <line x1="110" y1="208" x2="58"  y2="238"/>
    <line x1="58"  y1="238" x2="36"  y2="262"/>
    <line x1="36"  y1="262" x2="72"  y2="270"/>
  </g>
  <!-- Node 1 -->
  <circle class="ring1" cx="60" cy="68" r="6" fill="none" stroke="#4F9DFF" stroke-width="0.5" opacity="0.5"/>
  <circle class="n1" cx="60"  cy="68"  r="4"   fill="#4F9DFF" filter="url(#f-node)"/>
  <!-- Node 2 -->
  <circle class="ring2" cx="152" cy="46" r="6" fill="none" stroke="#00F0FF" stroke-width="0.5" opacity="0.5"/>
  <circle class="n2" cx="152" cy="46"  r="3"   fill="#00F0FF" filter="url(#f-node-sm)"/>
  <!-- Node 3 -->
  <circle class="n3" cx="110" cy="208" r="3.5" fill="#4F9DFF" filter="url(#f-node-sm)"/>
  <!-- Node 4 -->
  <circle class="n4" cx="58"  cy="238" r="2.5" fill="#4F9DFF" filter="url(#f-node-sm)"/>
  <circle cx="36" cy="262" r="1.8" fill="#4F9DFF" opacity="0.4"/>
  <circle cx="72" cy="270" r="1.5" fill="#4F9DFF" opacity="0.3"/>

  <!-- ═══ RIGHT NODE CLUSTER ═══ -->
  <g stroke="#4F9DFF" stroke-width="0.7" opacity="0.28" fill="none">
    <line x1="696" y1="58"  x2="748" y2="188"/>
    <line x1="748" y1="188" x2="644" y2="238"/>
    <line x1="644" y1="238" x2="728" y2="256"/>
    <line x1="728" y1="256" x2="770" y2="248"/>
    <line x1="696" y1="58"  x2="764" y2="38"/>
  </g>
  <!-- Node 5 -->
  <circle class="ring2" cx="696" cy="58"  r="6" fill="none" stroke="#4F9DFF" stroke-width="0.5" opacity="0.5"/>
  <circle class="n5" cx="696" cy="58"  r="4"   fill="#4F9DFF" filter="url(#f-node)"/>
  <!-- Node 6 -->
  <circle class="ring1" cx="748" cy="188" r="6" fill="none" stroke="#00F0FF" stroke-width="0.5" opacity="0.4"/>
  <circle class="n6" cx="748" cy="188" r="3.5" fill="#00F0FF" filter="url(#f-node-sm)"/>
  <!-- Node 7 -->
  <circle class="n7" cx="644" cy="238" r="3"   fill="#4F9DFF" filter="url(#f-node-sm)"/>
  <!-- Node 8 -->
  <circle class="n8" cx="728" cy="256" r="2.5" fill="#4F9DFF" filter="url(#f-node-sm)"/>
  <circle cx="770" cy="248" r="1.8" fill="#4F9DFF" opacity="0.35"/>
  <circle cx="764" cy="38"  r="2"   fill="#00F0FF" opacity="0.45"/>

  <!-- ═══ DATA PACKETS ═══ -->
  <circle r="2.2" fill="#00F0FF" filter="url(#f-node-sm)">
    <animateMotion dur="3.2s" repeatCount="indefinite" begin="0s"><mpath xlink:href="#pA"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.06;0.94;1" dur="3.2s" repeatCount="indefinite" begin="0s"/>
  </circle>
  <circle r="1.8" fill="#4F9DFF" filter="url(#f-node-sm)">
    <animateMotion dur="3.8s" repeatCount="indefinite" begin="1.2s"><mpath xlink:href="#pB"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.06;0.94;1" dur="3.8s" repeatCount="indefinite" begin="1.2s"/>
  </circle>
  <circle r="1.6" fill="#00F0FF" filter="url(#f-node-sm)">
    <animateMotion dur="2.9s" repeatCount="indefinite" begin="2.5s"><mpath xlink:href="#pC"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.06;0.94;1" dur="2.9s" repeatCount="indefinite" begin="2.5s"/>
  </circle>
  <circle r="2"   fill="#4F9DFF" filter="url(#f-node-sm)">
    <animateMotion dur="4.1s" repeatCount="indefinite" begin="0.8s"><mpath xlink:href="#pD"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.06;0.94;1" dur="4.1s" repeatCount="indefinite" begin="0.8s"/>
  </circle>
  <circle r="1.7" fill="#00F0FF" filter="url(#f-node-sm)">
    <animateMotion dur="3.5s" repeatCount="indefinite" begin="2.0s"><mpath xlink:href="#pE"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.06;0.94;1" dur="3.5s" repeatCount="indefinite" begin="2.0s"/>
  </circle>
  <circle r="1.5" fill="#4F9DFF" filter="url(#f-node-sm)">
    <animateMotion dur="3.0s" repeatCount="indefinite" begin="3.3s"><mpath xlink:href="#pF"/></animateMotion>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.06;0.94;1" dur="3.0s" repeatCount="indefinite" begin="3.3s"/>
  </circle>

  <!-- ═══ GLASS CARD ═══ -->
  <rect x="168" y="42" width="464" height="196" rx="14"
        fill="url(#glass)"
        stroke="#4F9DFF" stroke-width="0.6" stroke-opacity="0.22"/>
  <!-- Top highlight -->
  <rect x="168" y="42" width="464" height="1" rx="0" fill="#4F9DFF" opacity="0.35"/>
  <!-- Corner brackets — TL -->
  <polyline points="168,62 168,42 188,42" fill="none" stroke="#4F9DFF" stroke-width="1.2" stroke-opacity="0.55"/>
  <!-- Corner brackets — TR -->
  <polyline points="612,42 632,42 632,62" fill="none" stroke="#4F9DFF" stroke-width="1.2" stroke-opacity="0.55"/>
  <!-- Corner brackets — BL -->
  <polyline points="168,218 168,238 188,238" fill="none" stroke="#4F9DFF" stroke-width="1.2" stroke-opacity="0.55"/>
  <!-- Corner brackets — BR -->
  <polyline points="612,238 632,238 632,218" fill="none" stroke="#4F9DFF" stroke-width="1.2" stroke-opacity="0.55"/>

  <!-- ═══ NAME TEXT ═══ -->
  <!-- Glow layer -->
  <text x="400" y="118"
        text-anchor="middle"
        font-family="'SF Pro Display', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="33" font-weight="700" letter-spacing="9"
        fill="#4F9DFF" opacity="0.12" filter="url(#f-text)">ADEMOLA BADRU</text>
  <!-- Main -->
  <text x="400" y="118"
        text-anchor="middle"
        font-family="'SF Pro Display', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="33" font-weight="700" letter-spacing="9"
        fill="#FFFFFF">ADEMOLA BADRU</text>

  <!-- ═══ ACCENT LINE ═══ -->
  <rect x="330" y="132" width="140" height="1" rx="1" fill="url(#accent-line)" filter="url(#f-line)"/>

  <!-- ═══ SUBTITLE ═══ -->
  <text x="400" y="160"
        text-anchor="middle"
        font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Courier New', monospace"
        font-size="12" font-weight="500" letter-spacing="1.2"
        fill="#4F9DFF">Building infrastructure. Building AI. Building Web3.</text>
  <!-- Blinking cursor -->
  <rect class="cursor" x="398" y="168" width="8" height="2" rx="1" fill="#4F9DFF"/>

  <!-- ═══ TAGLINE ═══ -->
  <text x="400" y="204"
        text-anchor="middle"
        font-family="'SF Pro Display', 'Inter', system-ui, -apple-system, sans-serif"
        font-size="9" font-weight="400" letter-spacing="3.2"
        fill="#444444">FULL-STACK · INFRASTRUCTURE · AI · WEB3 · OPEN SOURCE</text>

  <!-- ═══ VIGNETTE (edge fade) ═══ -->
  <rect width="800" height="280" fill="url(#vignette)"/>
</svg>
